<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF3131"/>
      <stop offset="55%" stop-color="#CC0001"/>
      <stop offset="100%" stop-color="#7A0000"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5555" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF5555" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer shield: modern angular/heptagonal silhouette -->
  <path d="
    M 256 32
    L 432 96
    L 432 264
    Q 432 376 256 472
    Q 80 376 80 264
    L 80 96
    Z
  " fill="url(#innerGrad)" stroke="url(#redGrad)" stroke-width="14" stroke-linejoin="round"/>

  <!-- Inner shield inset for depth -->
  <path d="
    M 256 64
    L 404 116
    L 404 262
    Q 404 354 256 436
    Q 108 354 108 262
    L 108 116
    Z
  " fill="none" stroke="#CC0001" stroke-width="3" stroke-opacity="0.5" stroke-linejoin="round"/>

  <!-- Diagonal highlight for metallic sheen -->
  <path d="M 100 110 L 256 60 L 256 120 L 120 270 Z" fill="url(#highlightGrad)" opacity="0.25"/>

  <!-- Centermark: abstract "A" formed by chevrons -->
  <g filter="url(#glow)">
    <path d="M 256 150 L 326 330 L 288 330 L 256 250 L 224 330 L 186 330 Z" fill="url(#redGrad)"/>
    <path d="M 220 280 L 256 195 L 292 280 L 276 280 L 256 235 L 236 280 Z" fill="#0a0a0a"/>
  </g>

  <!-- Crossbar of A -->
  <rect x="216" y="285" width="80" height="14" rx="3" fill="url(#redGrad)"/>

  <!-- Subtle quantum-dot motif: 4 corner nodes representing quantum entanglement -->
  <g fill="#FF3131" opacity="0.85">
    <circle cx="160" cy="180" r="6"/>
    <circle cx="352" cy="180" r="6"/>
    <circle cx="160" cy="320" r="6"/>
    <circle cx="352" cy="320" r="6"/>
  </g>
  <g stroke="#FF3131" stroke-width="1.5" opacity="0.35" fill="none">
    <path d="M 160 180 L 352 180 L 352 320 L 160 320 Z"/>
    <path d="M 160 180 L 352 320 M 352 180 L 160 320"/>
  </g>
</svg>